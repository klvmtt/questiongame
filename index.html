<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tantangan 5 Round</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #fff;
      padding: 18px;
    }

    .game-card {
      width: 100%;
      max-width: 430px;
      background: #1e293b;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .info-box {
      background: #334155;
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
    }

    .label {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .value {
      font-size: 22px;
      font-weight: 700;
    }

    .status-box {
      background: #334155;
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      margin-bottom: 14px;
    }

    .status-value {
      font-size: 18px;
      font-weight: 700;
    }

    .question-box {
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 14px;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 16px;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn,
    .main-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .answer-btn {
      background: #e2e8f0;
      color: #0f172a;
    }

    .answer-btn:hover {
      transform: translateY(-1px);
      background: #ffffff;
    }

    .answer-btn:active,
    .main-btn:active {
      transform: scale(0.99);
    }

    .main-btn {
      margin-top: 12px;
      background: #22c55e;
      color: #fff;
    }

    .main-btn:hover {
      background: #16a34a;
    }

    .footer-note {
      text-align: center;
      margin-top: 16px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }
    .warn { color: #facc15; }

    @media (max-width: 480px) {
      .title { font-size: 25px; }
      .question-box { font-size: 17px; min-height: 120px; }
      .value { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="game-card">
    <div class="title">Tantangan 5 Round</div>

    <div class="subtitle">
      Jawab 5 pertanyaan umum dengan cepat dan tepat.<br>
      Salah, kehabisan waktu, atau refresh halaman = kembali ke Round 1.
    </div>

    <div class="info-grid">
      <div class="info-box">
        <div class="label">Round</div>
        <div class="value" id="roundText">1 / 5</div>
      </div>
      <div class="info-box">
        <div class="label">Waktu</div>
        <div class="value" id="timerText">10</div>
      </div>
    </div>

    <div class="status-box">
      <div class="label">Status</div>
      <div class="status-value" id="statusText">Main</div>
    </div>

    <div class="question-box" id="questionText">
      Memuat pertanyaan...
    </div>

    <div class="answers" id="answersBox"></div>

    <button class="main-btn" id="startBtn">Mulai</button>

    <div class="footer-note">
      Menang jika berhasil menjawab semua 5 round sebelum waktu habis.
    </div>
  </div>

  <script>

      {

        options: ["Louis Pasteur", "Alexander Fleming", "Edward Jenner", "Robert Koch"],

      },
      {

        options: ["Kilimanjaro", "Kenya", "Elgon", "Meru"],
        answer: "Kilimanjaro"
      },
      {

        options: ["Hati", "Ginjal", "Pankreas", "Limpa"],
        answer: "Pankreas"
      },
      {

        options: ["Inggris", "Italia", "Jerman", "Spanyol"],
        answer: "Italia"
      },
      {

        options: ["0", "1", "2", "4"],

      {

        options: ["Laut Merah", "Laut Hitam", "Laut Mati", "Laut Kaspia"],
        answer: "Laut Mati"
      },
      {
        question: "Siapa tokoh utama dalam epos 'Odyssey'?",
        options: ["Achilles", "Odysseus", "Hector", "Perseus"],
        answer: "Odysseus"
      },
      {
        question: "Negara manakah yang memiliki jumlah pulau terbanyak menurut data umum yang sering dirujuk?",
        options: ["Indonesia", "Filipina", "Swedia", "Jepang"],
        answer: "Swedia"
      },
      {
        question: "Apa nama ibukota Mongolia?",
        options: ["Astana", "Tashkent", "Ulaanbaatar", "Bishkek"],
        answer: "Ulaanbaatar"
      },
      {
        question: "Siapa yang mengembangkan teori relativitas umum?",
        options: ["Nikola Tesla", "Albert Einstein", "Niels Bohr", "James Clerk Maxwell"],
        answer: "Albert Einstein"
      },
      {

        options: ["Amazon", "Nil", "Yangtze", "Mississippi"],
        answer: "Nil"
      },
      {

        options: ["Evaporasi", "Sublimasi", "Kondensasi", "Presipitasi"],
        answer: "Kondensasi"
      },
      {
        question: "Siapa pengarang 'One Hundred Years of Solitude'?",
        options: ["Mario Vargas Llosa", "Gabriel García Márquez", "Pablo Neruda", "Jorge Luis Borges"],
        answer: "Gabriel García Márquez"
      },
      {
        question: "Dalam musik, berapa jumlah simfoni yang selesai ditulis Beethoven?",
        options: ["7", "8", "9", "10"],
        answer: "9"
      },
      {
        question: "Apa nama gurun panas terbesar di dunia?",
        options: ["Gobi", "Kalahari", "Arab", "Sahara"],
        answer: "Sahara"
      },
      {
        question: "Badan sel tempat DNA manusia paling banyak tersimpan adalah...",
        options: ["Membran sel", "Nukleus", "Mitokondria", "Sitoplasma"],
        answer: "Nukleus"
      },
      {
        question: "Negara yang dikenal sebagai tempat lahir Olimpiade kuno adalah...",
        options: ["Italia", "Yunani", "Mesir", "Turki"],
        answer: "Yunani"
      },
      {
        question: "Apa nama mata uang resmi Swiss?",
        options: ["Euro", "Krone", "Franc Swiss", "Mark"],
        answer: "Franc Swiss"
      },
      {
        question: "Siapa penulis 'The Republic'?",
        options: ["Plato", "Socrates", "Aristoteles", "Heraclitus"],
        answer: "Plato"
      },
      {
        question: "Dalam tabel periodik, simbol Fe adalah...",
        options: ["Fluorin", "Fermium", "Besi", "Emas"],
        answer: "Besi"
      },
      {
        question: "Piramida Giza berada di negara...",
        options: ["Sudan", "Mesir", "Yordania", "Arab Saudi"],
        answer: "Mesir"
      },
      {
        question: "Organisasi PBB yang fokus pada pendidikan, ilmu pengetahuan, dan kebudayaan adalah...",
        options: ["UNICEF", "WHO", "UNESCO", "UNHCR"],
        answer: "UNESCO"
      },
      {
        question: "Siapa komposer opera 'The Magic Flute'?",
        options: ["Mozart", "Bach", "Chopin", "Vivaldi"],
        answer: "Mozart"
      },
      {
        question: "Apa nama galaksi tempat tata surya kita berada?",
        options: ["Andromeda", "Bima Sakti", "Sombrero", "Triangulum"],
        answer: "Bima Sakti"
      },
      {
        question: "Negara dengan populasi terbesar di dunia saat ini adalah...",
        options: ["China", "India", "Amerika Serikat", "Indonesia"],
        answer: "India"
      },
      {
        question: "Bagian mata yang mengatur banyaknya cahaya masuk adalah...",
        options: ["Retina", "Kornea", "Iris", "Lensa"],
        answer: "Iris"
      },
      {
        question: "Siapa yang menulis drama 'Hamlet'?",
        options: ["Christopher Marlowe", "William Shakespeare", "Ben Jonson", "Charles Dickens"],
        answer: "William Shakespeare"
      },
      {
        question: "Apa nama lautan terbesar di dunia?",
        options: ["Atlantik", "Hindia", "Pasifik", "Arktik"],
        answer: "Pasifik"
      },
      {
        question: "Satuan arus listrik adalah...",
        options: ["Volt", "Ampere", "Watt", "Ohm"],
        answer: "Ampere"
      },
      {
        question: "Negara manakah yang memiliki kota Istanbul?",
        options: ["Yunani", "Turki", "Iran", "Mesir"],
        answer: "Turki"
      },
      {
        question: "Siapa pencetus heliosentris yang terkenal sebelum dikembangkan lebih jauh oleh ilmuwan lain?",
        options: ["Copernicus", "Galileo", "Tycho Brahe", "Ptolemy"],
        answer: "Copernicus"
      },
      {
        question: "Apa nama proses tumbuhan membuat makanan dengan bantuan cahaya?",
        options: ["Respirasi", "Fotosintesis", "Transpirasi", "Fermentasi"],
        answer: "Fotosintesis"
      },
      {
        question: "Logam cair pada suhu ruang yang paling dikenal adalah...",
        options: ["Merkuri", "Besi", "Timbal", "Aluminium"],
        answer: "Merkuri"
      },
      {
        question: "Ibukota Kanada adalah...",
        options: ["Toronto", "Ottawa", "Vancouver", "Montreal"],
        answer: "Ottawa"
      },
      {
        question: "Apa nama planet terdekat dengan Matahari?",
        options: ["Venus", "Mars", "Merkurius", "Bumi"],
        answer: "Merkurius"
      },
      {
        question: "Siapa yang menulis 'The Art of War'?",
        options: ["Confucius", "Laozi", "Sun Tzu", "Mencius"],
        answer: "Sun Tzu"
      },
      {
        question: "Dalam geometri, jumlah sudut dalam segitiga adalah...",
        options: ["90°", "180°", "270°", "360°"],
        answer: "180°"
      },
      {
        question: "Apa nama samudra yang berada di antara Afrika, Asia, dan Australia?",
        options: ["Pasifik", "Atlantik", "Hindia", "Arktik"],
        answer: "Hindia"
      },
      {
        question: "Siapa presiden pertama Amerika Serikat?",
        options: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
        answer: "George Washington"
      },
      {
        question: "Apa ibu kota Argentina?",
        options: ["Lima", "Santiago", "Bogotá", "Buenos Aires"],
        answer: "Buenos Aires"
      },
      {
        question: "Gas terbanyak di atmosfer Bumi adalah...",
        options: ["Oksigen", "Karbon dioksida", "Nitrogen", "Hidrogen"],
        answer: "Nitrogen"
      },
      {
        question: "Siapa matematikawan yang dikenal dengan teorema pada segitiga siku-siku?",
        options: ["Euclid", "Pythagoras", "Archimedes", "Euler"],
        answer: "Pythagoras"
      },
      {
        question: "Benua terkecil berdasarkan luas daratan adalah...",
        options: ["Eropa", "Australia", "Antarktika", "Amerika Selatan"],
        answer: "Australia"
      }
    ];

    const TOTAL_ROUNDS = 5;
    const TIME_PER_ROUND = 10;

    let gameQuestions = [];
    let currentRound = 0;
    let timeLeft = TIME_PER_ROUND;
    let timer = null;
    let lockAnswer = false;

    const roundText = document.getElementById("roundText");
    const timerText = document.getElementById("timerText");
    const statusText = document.getElementById("statusText");
    const questionText = document.getElementById("questionText");
    const answersBox = document.getElementById("answersBox");
    const startBtn = document.getElementById("startBtn");

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickRandomQuestions() {
      return shuffleArray(questionPool).slice(0, TOTAL_ROUNDS).map(q => ({
        question: q.question,
        options: shuffleArray(q.options),
        answer: q.answer
      }));
    }

    function updateHeader() {
      roundText.textContent = `${Math.min(currentRound + 1, TOTAL_ROUNDS)} / ${TOTAL_ROUNDS}`;
      timerText.textContent = timeLeft;
    }

    function setStatus(text, cls = "") {
      statusText.className = "status-value";
      if (cls) statusText.classList.add(cls);
      statusText.textContent = text;
    }

    function resetToIdle(message = "Memuat pertanyaan...") {
      clearInterval(timer);
      currentRound = 0;
      timeLeft = TIME_PER_ROUND;
      lockAnswer = false;
      updateHeader();
      setStatus("Main");
      questionText.textContent = message;
      answersBox.innerHTML = "";
      startBtn.classList.remove("hidden");
      startBtn.textContent = "Mulai";
    }

    function startGame() {
      clearInterval(timer);
      gameQuestions = pickRandomQuestions();
      currentRound = 0;
      timeLeft = TIME_PER_ROUND;
      lockAnswer = false;
      startBtn.classList.add("hidden");
      renderQuestion();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = TIME_PER_ROUND;
      timerText.textContent = timeLeft;

      timer = setInterval(() => {
        timeLeft--;
        timerText.textContent = timeLeft;

        if (timeLeft <= 0) {
          clearInterval(timer);
          handleLose("Waktu habis! Kembali ke Round 1.");
        }
      }, 1000);
    }

    function renderQuestion() {
      lockAnswer = false;
      updateHeader();
      setStatus("Main");

      const current = gameQuestions[currentRound];
      questionText.textContent = current.question;
      answersBox.innerHTML = "";

      current.options.forEach(option => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = option;
        btn.onclick = () => handleAnswer(option);
        answersBox.appendChild(btn);
      });

      startTimer();
    }

    function disableAnswers() {
      const buttons = answersBox.querySelectorAll("button");
      buttons.forEach(btn => btn.disabled = true);
    }

    function handleAnswer(selected) {
      if (lockAnswer) return;
      lockAnswer = true;
      disableAnswers();
      clearInterval(timer);

      const current = gameQuestions[currentRound];
      if (selected === current.answer) {
        if (currentRound === TOTAL_ROUNDS - 1) {
          handleWin();
          return;
        }

        setStatus("Benar!", "good");
        questionText.textContent = "Jawaban benar, lanjut ke round berikutnya...";
        setTimeout(() => {
          currentRound++;
          renderQuestion();
        }, 700);
      } else {
        handleLose("Jawaban salah! Kembali ke Round 1.");
      }
    }

    function handleLose(message) {
      clearInterval(timer);
      setStatus("Kalah", "bad");
      questionText.textContent = message;
      answersBox.innerHTML = "";
      startBtn.classList.remove("hidden");
      startBtn.textContent = "Coba Lagi (Soal Baru)";
      currentRound = 0;
      timeLeft = TIME_PER_ROUND;
      updateHeader();
    }

    function handleWin() {
      clearInterval(timer);
      setStatus("Menang!", "good");
      questionText.textContent = "Selamat! Kamu berhasil menyelesaikan semua 5 round.";
      answersBox.innerHTML = "";
      startBtn.classList.remove("hidden");
      startBtn.textContent = "Main Lagi (Soal Baru)";
      currentRound = 0;
      timeLeft = TIME_PER_ROUND;
      updateHeader();
    }

    startBtn.addEventListener("click", startGame);

    resetToIdle();
  </script>
</body>
</html>
